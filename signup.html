<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #007BFF, #ff4fd8);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .signup-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      max-width: 420px;
      width: 100%;
      text-align: center;
      color: #fff;
    }

    .home-link {
      text-align: left;
      margin-bottom: 15px;
    }

    .home-link a {
      color: #eee;
      text-decoration: none;
      font-size: 0.95rem;
      transition: 0.3s;
    }

    .home-link a:hover {
      color: #fff;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1rem;
      margin-bottom: 25px;
      color: #f0f0f0;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 18px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      box-shadow: 0 0 8px rgba(255,255,255,0.6);
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #fff;
      color: #007BFF;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      margin-top: 5px;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .links {
      margin-top: 15px;
      font-size: 0.95rem;
    }

    .links a {
      color: #fff;
      text-decoration: underline;
      margin-left: 5px;
    }

    .footer-text {
      margin-top: 25px;
      font-size: 0.85rem;
      color: #ddd;
    }

    @media (max-width: 480px) {
      .signup-container {
        padding: 30px 20px;
      }

      h1 {
        font-size: 1.8rem;
      }
    }

  </style>
</head>

<body>

  <div class="signup-container">

    <div class="home-link">
      <a href="index.html">← Back to Home</a>
    </div>

    <h1>Create Account</h1>
    <p>Join Orbit Studios and start designing your own unique fashion experience.</p>

    <form>
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="text" placeholder="Username" required>
      <input type="password" placeholder="Password" required>
      <input type="password" placeholder="Confirm Password" required>
      <button type="submit">Sign Up</button>
    </form>

    <div class="links">
      <span>Already have an account?</span>
      <a href="login.html">Log In</a>
    </div>

    <div class="footer-text">
            <p>&copy; 2026 <a href ="https://orbitstudios26ng-spec.github.io/orbit-studios/">Orbit Studios</a>. All rights reserved.</p>
    </div>

  </div>

</body>
</html>
