<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    /* Reset default styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      background-color: #fff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      color: #222;
      margin-bottom: 20px;
    }

    form p {
      font-size: 1rem;
      color: #555;
      margin-bottom: 20px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #007BFF;
      box-shadow: 0 0 5px rgba(0,123,255,0.3);
    }

    button {
      width: 100%;
      padding: 12px 0;
      background-color: #007BFF;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }

    .home-link {
      text-align: left;
      margin-bottom: 15px;
    }

    .home-link a {
      color: #555;
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.3s ease;
    }

    .home-link a:hover {
      color: #007BFF;
    }

    .links {
      margin-top: 15px;
      font-size: 0.95rem;
    }

    .links a {
      color: #007BFF;
      text-decoration: none;
      margin-left: 5px;
      transition: color 0.3s ease;
    }

    .links a:hover {
      color: #0056b3;
    }

    .footer-text {
      margin-top: 25px;
      font-size: 0.9rem;
      color: #777;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 30px 20px;
      }

      h1 {
        font-size: 1.8rem;
      }

      input[type="text"],
      input[type="password"] {
        font-size: 0.95rem;
      }

      button {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="home-link">
      <a href="index.html">← Back to Home</a>
    </div>

    <h1>Login</h1>
    <form action="#" method="POST">
      <input type="text" placeholder="Username" name="username" required>
      <input type="password" placeholder="Password" name="password" required>
      <button type="submit">Log In</button>
    </form>

    <div class="links">
      <span>Don't have an account?</span>
      <a href="signup.html">Sign Up</a>
    </div>

    <div class="footer-text">
      <p>&copy; 2026 <a href ="https://orbitstudios26ng-spec.github.io/orbit-studios/">Orbit Studios</a>. All rights reserved.</p>
    </div>
  </div>

</body>
</html>
